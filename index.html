<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DM Helper</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="topbar">
      <div>
        <h1>DM Helper</h1>
        <p>Standalone planning, session tracking, and Foundry export.</p>
      </div>
      <div class="top-actions">
        <button id="seed-btn" class="btn btn-secondary">Load Starter Data</button>
        <button id="export-btn" class="btn btn-secondary">Export Campaign JSON</button>
        <button id="import-btn" class="btn btn-primary">Import Campaign JSON</button>
        <input id="import-file" type="file" accept=".json,application/json" hidden />
      </div>
    </header>

    <nav id="tabs" class="tabs"></nav>
    <main id="app" class="app"></main>

    <script type="module" src="./app.js"></script>
  </body>
  </html>
